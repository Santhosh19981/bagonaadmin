<div class="flex h-screen bg-[#f8fafc] overflow-hidden">
    <app-sidemenu [menuFromParent]="'profile-management'"></app-sidemenu>

    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <app-header></app-header>

        <main class="flex-1 overflow-y-auto px-4 py-8 sm:px-6 lg:px-8">
            <div class="max-w-4xl mx-auto space-y-6">

                <!-- Page Header -->
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-2xl font-black text-slate-800 tracking-tight">Profile Management</h1>
                        <p class="text-sm text-slate-500 font-medium">Update your business details and profile image</p>
                    </div>
                    <button (click)="saveProfile()" [disabled]="saving || loading"
                        class="px-6 py-2.5 bg-yellow-500 hover:bg-yellow-600 text-white font-bold rounded-2xl shadow-lg shadow-yellow-500/30 transition-all active:scale-95 disabled:opacity-50 flex items-center gap-2">
                        <span *ngIf="saving"
                            class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
                        {{ saving ? 'Saving...' : 'Save Changes' }}
                    </button>
                </div>

                <!-- Profile Section -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

                    <!-- Left: Profile Image Card -->
                    <div class="lg:col-span-1 space-y-6">
                        <div
                            class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100/60 flex flex-col items-center">
                            <div class="relative group">
                                <div
                                    class="w-32 h-32 rounded-3xl overflow-hidden border-4 border-slate-50 shadow-xl shadow-slate-200/50 bg-slate-100 flex items-center justify-center">
                                    <img *ngIf="profileData.display_url" [src]="profileData.display_url"
                                        class="w-full h-full object-cover">
                                    <i *ngIf="!profileData.display_url"
                                        class="bi bi-person text-4xl text-slate-300"></i>
                                </div>
                                <label for="imageUpload"
                                    class="absolute -bottom-2 -right-2 p-2 bg-yellow-500 text-white rounded-xl shadow-lg cursor-pointer hover:bg-yellow-600 transition-all hover:scale-110">
                                    <i class="bi bi-camera-fill text-sm"></i>
                                    <input type="file" id="imageUpload" class="hidden" (change)="onFileSelected($event)"
                                        accept="image/*">
                                </label>
                            </div>
                            <h3 class="mt-4 text-lg font-black text-slate-800">{{ profileData.name }}</h3>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{{
                                profileData.businessname || 'Independent Vendor' }}</p>
                        </div>

                        <div class="bg-blue-600 p-6 rounded-[2rem] shadow-xl shadow-blue-600/20 text-white">
                            <div class="flex items-center gap-3 mb-4">
                                <div
                                    class="w-10 h-10 rounded-xl bg-white/20 backdrop-blur-md flex items-center justify-center">
                                    <i class="bi bi-info-circle-fill"></i>
                                </div>
                                <h4 class="font-bold">Pro Tip</h4>
                            </div>
                            <p class="text-xs text-blue-50 leading-relaxed font-medium">
                                Keep your business details updated to build trust with customers. A clear profile
                                picture helps you stand out!
                            </p>
                        </div>
                    </div>

                    <!-- Right: Details Form -->
                    <div class="lg:col-span-2 space-y-6">
                        <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100/60 space-y-6">

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="space-y-2">
                                    <label
                                        class="text-[11px] font-black text-slate-500 uppercase tracking-widest px-1">Full
                                        Name</label>
                                    <input type="text" [(ngModel)]="profileData.name" placeholder="Enter your name"
                                        class="w-full px-4 py-3 bg-slate-50 border-none rounded-2xl text-xs font-bold focus:ring-2 focus:ring-yellow-500/20 transition-all outline-none">
                                </div>
                                <div class="space-y-2">
                                    <label
                                        class="text-[11px] font-black text-slate-500 uppercase tracking-widest px-1">Business
                                        Name</label>
                                    <input type="text" [(ngModel)]="profileData.businessname"
                                        placeholder="Shop/Brand Name"
                                        class="w-full px-4 py-3 bg-slate-50 border-none rounded-2xl text-xs font-bold focus:ring-2 focus:ring-yellow-500/20 transition-all outline-none">
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="space-y-2">
                                    <label
                                        class="text-[11px] font-black text-slate-500 uppercase tracking-widest px-1">Email
                                        Address</label>
                                    <input type="email" [(ngModel)]="profileData.email" placeholder="email@example.com"
                                        disabled
                                        class="w-full px-4 py-3 bg-slate-100 border-none rounded-2xl text-xs font-bold text-slate-400 cursor-not-allowed">
                                </div>
                                <div class="space-y-2">
                                    <label
                                        class="text-[11px] font-black text-slate-500 uppercase tracking-widest px-1">Mobile
                                        Number</label>
                                    <input type="text" [(ngModel)]="profileData.mobile" placeholder="Contact number"
                                        class="w-full px-4 py-3 bg-slate-50 border-none rounded-2xl text-xs font-bold focus:ring-2 focus:ring-yellow-500/20 transition-all outline-none">
                                </div>
                            </div>

                            <div class="space-y-2">
                                <label
                                    class="text-[11px] font-black text-slate-500 uppercase tracking-widest px-1">Business
                                    Address</label>
                                <textarea rows="3" [(ngModel)]="profileData.address" placeholder="Complete address..."
                                    class="w-full px-4 py-3 bg-slate-50 border-none rounded-2xl text-xs font-bold focus:ring-2 focus:ring-yellow-500/20 transition-all outline-none resize-none"></textarea>
                            </div>

                            <div class="space-y-2">
                                <label
                                    class="text-[11px] font-black text-slate-500 uppercase tracking-widest px-1">Business
                                    Description</label>
                                <textarea rows="4" [(ngModel)]="profileData.describe"
                                    placeholder="Tell customers about your services..."
                                    class="w-full px-4 py-3 bg-slate-50 border-none rounded-2xl text-xs font-bold focus:ring-2 focus:ring-yellow-500/20 transition-all outline-none resize-none"></textarea>
                            </div>

                        </div>
                    </div>

                </div>

            </div>
        </main>
    </div>
</div>
